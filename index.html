<!DOCTYPE html>
<html>
<head>
<title>My Mobile App Demo</title>
<style>
.phone-mockup {
width: 375px; /* iPhone width */
height: 812px; /* iPhone height */
margin: 0 auto;
border: 12px solid #111;
border-radius: 40px;
overflow: hidden;
position: relative;
}
.iframe-container {
width: 100%;
height: 100%;
overflow: auto;
-webkit-overflow-scrolling: touch; /* Smooth
mobile scroll */
}
iframe {
width: 100%;
height: 100%;
border: none;
}
</style>
</head>
<body>
<h1>My Mobile App Prototype</h1>
<div class="phone-mockup">
<div class="miro-container" style="position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden;">
  <iframe 
    src="https://miro.com/app/live-embed/uXjVGmBEOk4=/?embedMode=view_only_without_ui&moveToViewport=3300,405,4788,1821&embedId=964467046047" 
    frameborder="0" 
    scrolling="no" 
    allow="fullscreen; clipboard-read; clipboard-write" 
    allowfullscreen
    style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;">
  </iframe>
</div>
</div>
</div>
</body>
</html>
