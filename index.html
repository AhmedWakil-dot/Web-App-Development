<!DOCTYPE html>
<html>
<head>
<title>My Mobile App Demo</title>
<style>
.phone-mockup {
width: 375px; /* iPhone width */
height: 812px; /* iPhone height */
margin: 0 auto;
border: 12px solid #111;
border-radius: 40px;
overflow: hidden;
position: relative;
}
.iframe-container {
width: 100%;
height: 100%;
overflow: auto;
-webkit-overflow-scrolling: touch; /* Smooth
mobile scroll */
}
iframe {
width: 100%;
height: 100%;
border: none;
}
</style>
</head>
<body>
<h1>My Mobile App Prototype</h1>
<div class="phone-mockup">
<div class="iframe-container">
<iframe
src="https://xd.adobe.com/embed/YOUR-
PROTOTYPE-ID"></iframe>
</div>
</div>
</body>
</html>
